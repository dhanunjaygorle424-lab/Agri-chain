{% extends 'base.html' %}
{% block title %}Buyer Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="fas fa-shopping-cart"></i> Buyer Login</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{% url 'BuyerUserLoginCheck' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Login ID</label>
                        <input type="text" name="loginid" class="form-control" placeholder="Enter Login ID" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>
                <hr>
                <p class="text-center">Don't have an account? <a href="{% url 'BuyerRegister' %}">Register here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
