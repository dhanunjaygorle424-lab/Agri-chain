{% extends 'base.html' %}
{% block title %}Update Crop{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h4><i class="fas fa-edit"></i> Update Crop</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{% url 'SellerCropUpdateAction' %}" enctype="multipart/form-data">
                    {% csrf_token %}
                    <input type="hidden" name="id" value="{{ crop.id }}">
                    <div class="form-group">
                        <label>Crop Name</label>
                        <input type="text" name="cropname" class="form-control" value="{{ crop.cropname }}" required>
                    </div>
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" name="price" step="0.01" class="form-control" value="{{ crop.price }}" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" class="form-control" rows="4" required>{{ crop.description }}</textarea>
                    </div>
                    <div class="form-group">
                        <label>Current Image</label><br>
                        {% if crop.file %}
                        <img src="/media/{{ crop.file }}" width="120" height="90" style="object-fit:cover;" class="mb-2"><br>
                        {% endif %}
                        <label>Upload New Image (optional)</label>
                        <input type="file" name="file" class="form-control-file">
                    </div>
                    <button type="submit" class="btn btn-warning btn-block">Update Crop</button>
                </form>
            </div>
        </div>
        <a href="{% url 'SellersCommodities' %}" class="btn btn-secondary mt-3"><i class="fas fa-arrow-left"></i> Back</a>
    </div>
</div>
{% endblock %}
