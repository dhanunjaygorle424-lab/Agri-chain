{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white text-center">
                <h4><i class="fas fa-user-shield"></i> Admin Login</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{% url 'AdminLoginCheck' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Admin Username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Admin Password" required>
                    </div>
                    <button type="submit" class="btn btn-danger btn-block">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
